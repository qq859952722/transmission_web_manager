<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transmission Web Control - 移动版</title>
    <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>
    <div class="m-loading" id="m-loading">
        <div class="m-spinner"></div>
        <div style="margin-top:12px;font-size:13px;color:var(--text-muted)">正在连接...</div>
    </div>

    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/rpc.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/mobile.js"></script>
    <script src="js/mobile-views.js"></script>
    <script>
    (function() {
        var rpcUrl = '/transmission/rpc';
        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('rpc')) {
            rpcUrl = urlParams.get('rpc');
        }

        TWC.rpc.setConfig(rpcUrl);

        TWC.rpc.testConnection(function(success, data) {
            if (success) {
                TWC.rpc.getSession(null, function(sessionData, sessionSuccess) {
                    if (sessionSuccess) {
                        $('#m-loading').fadeOut(200, function() { $(this).remove(); });
                        TWC.mobile.init();
                    } else {
                        _showLogin();
                    }
                });
            } else {
                _showLogin();
            }
        });

        function _showLogin() {
            $('#m-loading').remove();
            var html = '<div class="m-login">' +
                '<h2>Transmission</h2>' +
                '<p style="font-size:12px;color:var(--text-muted);margin-bottom:20px">请输入连接信息</p>' +
                '<div class="m-form-group">' +
                '<label>RPC 地址</label>' +
                '<input type="text" id="m-login-url" value="' + TWC.utils.escapeHtml(rpcUrl) + '" />' +
                '</div>' +
                '<div class="m-form-group">' +
                '<label>用户名</label>' +
                '<input type="text" id="m-login-username" placeholder="可选" />' +
                '</div>' +
                '<div class="m-form-group">' +
                '<label>密码</label>' +
                '<input type="password" id="m-login-password" placeholder="可选" />' +
                '</div>' +
                '<div id="m-login-error" style="color:var(--color-danger-500);font-size:12px;margin-bottom:8px;display:none"></div>' +
                '<button class="m-btn primary" id="m-login-submit" style="width:100%">连接</button>' +
                '</div>';
            $('body').html(html);

            $('#m-login-submit').on('click', function() {
                var url = $('#m-login-url').val().trim();
                var username = $('#m-login-username').val().trim();
                var password = $('#m-login-password').val();

                TWC.rpc.setConfig(url, username, password);
                $('#m-login-error').hide();

                TWC.rpc.testConnection(function(success2) {
                    if (success2) {
                        TWC.mobile.init();
                    } else {
                        $('#m-login-error').text('连接失败，请检查地址和认证信息').show();
                    }
                });
            });

            $('#m-login-password').on('keydown', function(e) {
                if (e.key === 'Enter') $('#m-login-submit').click();
            });
        }
    })();
    </script>
</body>
</html>
